services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: datalogger
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d datalogger"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@timescaledb:5432/datalogger
      QUAWACO_API_KEYS: ${QUAWACO_API_KEYS:-change-me-in-production}
      MAX_READINGS_PER_REQUEST: "5000"
    depends_on:
      timescaledb:
        condition: service_healthy

volumes:
  timescale_data:
